version: '3.8'

services:

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./www:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/logs:/var/log/nginx/
    environment:
      TZ: ${TIMEZONE}
    depends_on:
      - php-7.4
      - php-8.0

  php-7.4:
    container_name: php-7.4
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        WORKSPACE_PHP_VERSION: '7.4'
        TZ: ${TIMEZONE}
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./www:/var/www
      - ./php/7.4/php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mysql-5.7
      - mysql-8.0

  php-8.0:
    container_name: php-8.0
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        WORKSPACE_PHP_VERSION: '8.0'
        TZ: ${TIMEZONE}
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - ./www:/var/www
      - ./php/8.0/php.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mysql-5.7
      - mysql-8.0

  mysql-5.7:
    image: mysql:5.7
    container_name: mysql-5.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ./mysql/5.7/data:/var/lib/mysql
      - ./mysql/5.7/conf.d:/etc/mysql/conf.d
      - ./mysql/5.7/logs:/var/log/mysql/
      - ./mysql/5.7/dump:/dump

  mysql-8.0:
    image: mysql:8.0
    container_name: mysql-8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ./mysql/8.0/data:/var/lib/mysql
      - ./mysql/8.0/conf.d:/etc/mysql/conf.d
      - ./mysql/8.0/logs:/var/log/mysql/
      - ./mysql/8.0/dump:/dump
